<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>錯題回顧</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            max-width: 1000px; margin: 0 auto; background: white;
            border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;
        }
        h1 { color: #333; font-size: 2em; }
        .back-btn {
            padding: 10px 20px; background: #6c757d; color: white;
            text-decoration: none; border-radius: 8px; transition: background 0.3s;
        }
        .back-btn:hover { background: #5a6268; }
        .stats-bar {
            background: #fff3cd; padding: 20px; border-radius: 15px; margin-bottom: 30px;
            display: flex; justify-content: space-around; align-items: center;
            flex-wrap: wrap; gap: 20px;
        }
        .stat-item { text-align: center; }
        .stat-number { font-size: 2em; font-weight: bold; color: #dc3545; }
        .stat-label { color: #666; margin-top: 5px; }
        .controls {
            background: #f8f9ff; padding: 25px; border-radius: 15px; margin-bottom: 30px;
        }
        .filter-group { margin-bottom: 20px; }
        .filter-group:last-child { margin-bottom: 0; }
        .filter-group h3 { color: #555; margin-bottom: 15px; font-size: 1.1em; }
        .filter-options { display: flex; gap: 10px; flex-wrap: wrap; }
        .control-btn {
            padding: 8px 18px; border: 2px solid #ddd; background: white;
            border-radius: 20px; font-size: 14px; cursor: pointer; transition: all 0.3s;
        }
        .control-btn:hover { border-color: #f5576c; color: #f5576c; }
        .control-btn.active {
            background: #f5576c; color: white; border-color: #f5576c; font-weight: bold;
        }
        .clear-btn-container {
            text-align: right; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;
        }
        .clear-btn {
            padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px;
            font-weight: bold; cursor: pointer; transition: all 0.3s;
            background: #dc3545; color: white;
        }
        .clear-btn:hover { background: #c82333; }
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .empty-state .icon { font-size: 5em; margin-bottom: 20px; }
        .empty-state h2 { color: #333; margin-bottom: 10px; }
        .wrong-question-item {
            background: #fff8f8; padding: 25px; margin-bottom: 25px;
            border-radius: 15px; border-left: 5px solid #dc3545;
        }
        .question-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 15px; gap: 10px; flex-wrap: wrap;
        }
        .question-badges { display: flex; gap: 10px; flex-wrap: wrap; }
        .question-type, .question-chapter, .question-time {
            background: #dc3545; color: white; padding: 5px 12px;
            border-radius: 20px; font-size: 0.85em;
        }
        .question-chapter { background: #17a2b8; }
        .question-time { background: #6c757d; font-size: 0.75em; }
        .delete-btn {
            padding: 5px 15px; background: #6c757d; color: white;
            border: none; border-radius: 5px; cursor: pointer;
            font-size: 0.85em; transition: background 0.3s;
        }
        .delete-btn:hover { background: #5a6268; }
        .question-title {
            font-size: 1.1em; color: #333; margin-bottom: 15px;
            line-height: 1.6; font-weight: 500;
        }
        .answer-info { background: white; padding: 15px; border-radius: 10px; margin-top: 15px; }
        .answer-row { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .answer-row.user { background: #f8d7da; }
        .answer-row.correct { background: #d4edda; }
        .answer-label { font-weight: bold; margin-right: 10px; }
        .user-answer { color: #721c24; }
        .correct-answer { color: #155724; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>❌ 錯題回顧</h1>
            <a href="index.html" class="back-btn">← 返回首頁</a>
        </div>

        <div class="stats-bar">
            <div class="stat-item"><div class="stat-number" id="totalWrong">0</div><div class="stat-label">總錯題數</div></div>
            <div class="stat-item"><div class="stat-number" id="singleCount">0</div><div class="stat-label">單選題</div></div>
            <div class="stat-item"><div class="stat-number" id="multipleCount">0</div><div class="stat-label">多選題</div></div>
            <div class="stat-item"><div class="stat-number" id="textCount">0</div><div class="stat-label">填充題</div></div>
        </div>

        <div class="controls">
            <div class="filter-group">
                <h3>📚 按章節篩選</h3>
                <div class="filter-options" id="chapterFilters"></div>
            </div>
            <div class="filter-group">
                <h3>📋 按題型篩選</h3>
                <div class="filter-options">
                    <button class="control-btn filter-type active" data-type="all">全部顯示</button>
                    <button class="control-btn filter-type" data-type="single">單選題</button>
                    <button class="control-btn filter-type" data-type="multiple">多選題</button>
                    <button class="control-btn filter-type" data-type="text">填充題</button>
                </div>
            </div>
            <div class="clear-btn-container">
                <button class="clear-btn" onclick="clearWrongQuestions()">清除所有錯題記錄</button>
            </div>
        </div>

        <div id="wrongQuestionsList"></div>

        <div id="emptyState" class="empty-state hidden">
            <div class="icon">🎉</div>
            <h2>太棒了！</h2>
            <p>目前沒有錯題記錄</p>
            <p style="margin-top: 10px;"><a href="quiz.html" style="color: #667eea; text-decoration: none; font-weight: bold;">開始測驗 →</a></p>
        </div>
    </div>

    <script>
        let allWrongQuestions = [];
        let currentChapterFilter = 'all';
        let currentTypeFilter = 'all';

        window.addEventListener('DOMContentLoaded', function() {
            loadWrongQuestions();
        });

        function loadWrongQuestions() {
            allWrongQuestions = JSON.parse(localStorage.getItem('wrongQuestions')) || [];
            allWrongQuestions.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            createChapterFilters();
            setupFilterListeners();
            updateStats();
            displayWrongQuestions();
        }

        function createChapterFilters() {
            const container = document.getElementById('chapterFilters');
            container.innerHTML = '';

            const chapters = [...new Set(allWrongQuestions.map(q => q.chapter).filter(Boolean))];

            let buttonsHTML = '<button class="control-btn filter-chapter active" data-chapter="all">全部章節</button>';
            chapters.sort().forEach(chapter => {
                buttonsHTML += `<button class="control-btn filter-chapter" data-chapter="${chapter}">${chapter}</button>`;
            });
            container.innerHTML = buttonsHTML;
        }

        function setupFilterListeners() {
            document.querySelectorAll('.filter-chapter').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-chapter').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentChapterFilter = this.dataset.chapter;
                    displayWrongQuestions();
                });
            });

            document.querySelectorAll('.filter-type').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-type').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentTypeFilter = this.dataset.type;
                    displayWrongQuestions();
                });
            });
        }

        function updateStats() {
            document.getElementById('totalWrong').textContent = allWrongQuestions.length;
            document.getElementById('singleCount').textContent = allWrongQuestions.filter(q => q.type === 'single').length;
            document.getElementById('multipleCount').textContent = allWrongQuestions.filter(q => q.type === 'multiple').length;
            document.getElementById('textCount').textContent = allWrongQuestions.filter(q => q.type === 'text').length;
        }

        // 安全的答案格式化：支援 array / string / number / null
        function getSafeAnswerText(answerData, defaultText = '') {
            if (answerData === undefined || answerData === null) {
                return defaultText;
            }
            if (Array.isArray(answerData)) {
                return answerData
                    .filter(item => item !== null && item !== undefined && item !== '')
                    .map(item => String(item))
                    .join('、') || defaultText;
            }
            return String(answerData);
        }

        function displayWrongQuestions() {
            const container = document.getElementById('wrongQuestionsList');
            const emptyState = document.getElementById('emptyState');

            let filtered = allWrongQuestions;
            if (currentChapterFilter !== 'all') {
                filtered = filtered.filter(q => q.chapter === currentChapterFilter);
            }
            if (currentTypeFilter !== 'all') {
                filtered = filtered.filter(q => q.type === currentTypeFilter);
            }

            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                if (allWrongQuestions.length > 0) {
                    emptyState.querySelector('p').textContent = '此篩選條件下沒有錯題記錄';
                } else {
                    emptyState.querySelector('p').textContent = '目前沒有錯題記錄';
                }
                return;
            }

            emptyState.classList.add('hidden');
            container.innerHTML = '';

            filtered.forEach(wq => {
                const actualIndex = allWrongQuestions.findIndex(q => q === wq);
                const typeText = { single: '單選題', multiple: '多選題', text: '填充題' }[wq.type] || '未知題型';
                const chapterText = wq.chapter ? `<span class="question-chapter">${wq.chapter}</span>` : '';
                const timestamp = wq.timestamp
                    ? new Date(wq.timestamp).toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute:'2-digit' })
                    : '';

                const item = document.createElement('div');
                item.className = 'wrong-question-item';

                // userAnswer 可能是 index array / text / 空
                const userAnswerText = getSafeAnswerText(wq.userAnswer, '(未作答)');

                // correctAnswerText 如果 quiz 有幫你先算好(建議)，就優先顯示
                const correctAnswerText = getSafeAnswerText(wq.correctAnswerText || wq.answer, '(無標準答案)');

                item.innerHTML = `
                    <div class="question-header">
                        <div class="question-badges">
                            ${chapterText}
                            <span class="question-type">${typeText}</span>
                            ${timestamp ? `<span class="question-time">${timestamp}</span>` : ''}
                        </div>
                        <button class="delete-btn" onclick="deleteWrongQuestion(${actualIndex})">刪除</button>
                    </div>
                    <div class="question-title">${wq.question || ''}</div>
                    <div class="answer-info">
                        <div class="answer-row user">
                            <span class="answer-label">❌ 你的答案：</span>
                            <span class="user-answer">${userAnswerText}</span>
                        </div>
                        <div class="answer-row correct">
                            <span class="answer-label">✓ 正確答案：</span>
                            <span class="correct-answer">${correctAnswerText}</span>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function deleteWrongQuestion(index) {
            if (confirm('確定要刪除這個錯題記錄嗎？')) {
                allWrongQuestions.splice(index, 1);
                localStorage.setItem('wrongQuestions', JSON.stringify(allWrongQuestions));

                const stats = JSON.parse(localStorage.getItem('quizStats')) || { totalQuizzes: 0, totalWrong: 0, totalScore: 0 };
                stats.totalWrong = allWrongQuestions.length;
                localStorage.setItem('quizStats', JSON.stringify(stats));

                loadWrongQuestions();
            }
        }

        function clearWrongQuestions() {
            if (confirm('確定要清除所有錯題記錄嗎？此操作無法復原！')) {
                localStorage.removeItem('wrongQuestions');

                const stats = JSON.parse(localStorage.getItem('quizStats')) || { totalQuizzes: 0, totalWrong: 0, totalScore: 0 };
                stats.totalWrong = 0;
                localStorage.setItem('quizStats', JSON.stringify(stats));

                loadWrongQuestions();
                alert('已清除所有錯題記錄！');
            }
        }
    </script>
</body>
</html>
